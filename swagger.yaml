openapi: 3.0.3
info:
  title: Dracin API Gateway
  description: API Gateway untuk mengakses konten dari Dracin platform (Dramabox + ReelShort + Dramabite)
  version: 1.0.0
  contact:
    name: API Support
    email: support@dracin.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:4343
    description: Development Server

paths:
  /dramabox/latest:
    get:
      tags:
        - Dramabox
      summary: Get latest dramas
      description: Mengambil daftar drama terbaru
      parameters:
        - name: pageNo
          in: query
          description: Nomor halaman
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: Jumlah item per halaman
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"
              example:
                - bookId: "42000005973"
                  bookName: "Menantu Ibu Mertua"
                  coverWap: "https://hwztchapter.dramaboxdb.com/data/cppartner/4x2/42x0/420x0/42000005973/42000005973.jpg"
                  chapterCount: 96
                  introduction: "Cerita tentang menantu dan ibu mertua..."
                  tags: ["Drama", "Keluarga"]
                  protagonist: "Nama karakter"

  /dramabox/trending:
    get:
      tags:
        - Dramabox
      summary: Get trending dramas
      description: Mengambil daftar drama yang sedang tren
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"

  /dramabox/for-you:
    get:
      tags:
        - Dramabox
      summary: Get recommended dramas
      description: Mengambil daftar drama yang direkomendasikan untuk user
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"

  /dramabox/vip:
    get:
      tags:
        - Dramabox
      summary: Get VIP dramas
      description: Mengambil daftar drama VIP/premium
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"

  /dramabox/random:
    get:
      tags:
        - Dramabox
      summary: Get random drama
      description: Mengambil drama acak
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"

  /dramabox/search:
    get:
      tags:
        - Dramabox
      summary: Search dramas
      description: Mencari drama berdasarkan keyword
      parameters:
        - name: query
          in: query
          description: Kata kunci pencarian
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"
        "400":
          description: Bad request - query parameter required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /dramabox/popular-searches:
    get:
      tags:
        - Dramabox
      summary: Get popular searches
      description: Mengambil daftar pencarian yang populer
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularSearch"

  /dramabox/dubbed:
    get:
      tags:
        - Dramabox
      summary: Get dubbed dramas
      description: Mengambil daftar drama yang sudah dubbing
      parameters:
        - name: classify
          in: query
          description: Klasifikasi (terpopuler/terbaru)
          required: true
          schema:
            type: string
            enum: [terpopuler, terbaru]
        - name: page
          in: query
          description: Nomor halaman
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drama"
        "400":
          description: Bad request - invalid classify parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /dramabox/detail:
    get:
      tags:
        - Dramabox
      summary: Get drama details
      description: Mengambil detail lengkap drama berdasarkan ID
      parameters:
        - name: bookId
          in: query
          description: ID drama (format 4200000XXXXX)
          required: true
          schema:
            type: string
            example: "42000005973"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DramaDetail"
        "400":
          description: Bad request - bookId required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /dramabox/episodes:
    get:
      tags:
        - Dramabox
      summary: Get drama episodes
      description: Mengambil daftar episode drama berdasarkan ID
      parameters:
        - name: bookId
          in: query
          description: ID drama (format 4200000XXXXX)
          required: true
          schema:
            type: string
            example: "42000005973"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"
        "400":
          description: Bad request - bookId required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reelshort/search:
    get:
      tags:
        - ReelShort
      summary: Search ReelShort dramas
      description: Cari drama berdasarkan kata kunci
      parameters:
        - name: keywords
          in: query
          required: true
          description: Kata kunci pencarian
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReelShortSearchResult"

  /reelshort/episodes/{bookId}:
    get:
      tags:
        - ReelShort
      summary: Get ReelShort episodes
      description: Dapatkan daftar episode dari drama
      parameters:
        - name: bookId
          in: path
          required: true
          description: ID dari hasil search
          schema:
            type: string
        - name: filtered_title
          in: query
          required: true
          description: Slug dari hasil search
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReelShortEpisode"

  /reelshort/video/{bookId}/{episodeNum}:
    get:
      tags:
        - ReelShort
      summary: Get ReelShort video URL
      description: Dapatkan URL video episode
      parameters:
        - name: bookId
          in: path
          required: true
          description: ID dari hasil search
          schema:
            type: string
        - name: episodeNum
          in: path
          required: true
          description: Nomor episode
          schema:
            type: integer
        - name: filtered_title
          in: query
          required: true
          description: Slug dari hasil search
          schema:
            type: string
        - name: chapter_id
          in: query
          required: true
          description: ID chapter dari episodes
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ReelShortVideo"

  /reelshort/recommend:
    get:
      tags:
        - ReelShort
      summary: Get recommended ReelShort dramas
      description: Mendapatkan drama yang direkomendasikan
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ReelShortBookshelf"

  /reelshort/dramadub:
    get:
      tags:
        - ReelShort
      summary: Get drama with dubbing
      description: Mendapatkan drama dengan dubbing
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ReelShortBookshelf"

  /reelshort/newrelease:
    get:
      tags:
        - ReelShort
      summary: Get new releases
      description: Mendapatkan drama rilis terbaru
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ReelShortBookshelf"

  /melolo/search:
    get:
      tags:
        - Melolo
      summary: Search Melolo novels
      description: Mencari novel berdasarkan kata kunci
      parameters:
        - name: query
          in: query
          description: Kata kunci pencarian
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: offset
          in: query
          description: Offset untuk pagination
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: Jumlah hasil per halaman
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MeloloSearchResult"
                  timestamp:
                    type: string
                    format: date-time
                  requestId:
                    type: string
        "400":
          description: Bad request - query parameter required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No novels found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /melolo/video-details:
    get:
      tags:
        - Melolo
      summary: Get video details for a series
      description: Mendapatkan detail video untuk series tertentu
      parameters:
        - name: series_id
          in: query
          description: ID series novel
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MeloloVideoDetail"
                  timestamp:
                    type: string
                    format: date-time
                  requestId:
                    type: string
        "400":
          description: Bad request - series_id parameter required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Video details not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /melolo/video-model:
    get:
      tags:
        - Melolo
      summary: Get video URL by video ID
      description: Mendapatkan URL streaming video berdasarkan video ID
      parameters:
        - name: video_id
          in: query
          description: ID video
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/MeloloVideoUrl"
                  timestamp:
                    type: string
                    format: date-time
                  requestId:
                    type: string
        "400":
          description: Bad request - video_id parameter required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Video URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /melolo/recommend:
    get:
      tags:
        - Melolo
      summary: Get recommended novels
      description: Mendapatkan daftar novel yang direkomendasikan
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MeloloRecommendation"
                  timestamp:
                    type: string
                    format: date-time
                  requestId:
                    type: string
        "404":
          description: No recommendations found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # Dramabite API Endpoints
  /dramabite/homepage:
    get:
      tags:
        - Dramabite
      summary: Get homepage dramas
      description: Mengambil daftar drama utama dari halaman beranda Dramabite
      parameters:
        - name: page
          in: query
          description: Nomor halaman untuk pagination
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Homepage dramas retrieved successfully"
                  data:
                    type: object
                    properties:
                      drama_module:
                        type: array
                        items:
                          $ref: "#/components/schemas/DramabiteDrama"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  timestamp:
                    type: string
                    format: date-time
                  requestId:
                    type: string

  /dramabite/end-module:
    get:
      tags:
        - Dramabite
      summary: Get additional modules
      description: Mengambil modul tambahan untuk infinite scroll
      parameters:
        - name: page
          in: query
          description: Nomor halaman untuk pagination
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "End module retrieved successfully"
                  data:
                    type: object
                    properties:
                      drama_module:
                        type: array
                        items:
                          $ref: "#/components/schemas/DramabiteDrama"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /dramabite/all:
    get:
      tags:
        - Dramabite
      summary: Get all available dramas
      description: Mengambil semua drama yang tersedia dari homepage dan modules
      parameters:
        - name: maxPages
          in: query
          description: Jumlah maksimal halaman yang akan diambil
          required: false
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 10
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "All dramas retrieved successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DramabiteDrama"
                  count:
                    type: integer
                    example: 50

  /dramabite/search:
    get:
      tags:
        - Dramabite
      summary: Search dramas
      description: Mencari drama berdasarkan judul
      parameters:
        - name: query
          in: query
          description: Kata kunci pencarian
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Search completed successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DramabiteDrama"
                  query:
                    type: string
                  count:
                    type: integer

  /dramabite/episodes:
    get:
      tags:
        - Dramabite
      summary: Get episode list
      description: Mengambil daftar episode untuk drama tertentu
      parameters:
        - name: cid
          in: query
          description: Drama ID
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Episode list retrieved successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DramabiteEpisode"
                  cid:
                    type: integer
                  episodeCount:
                    type: integer

  /dramabite/episode-detail:
    get:
      tags:
        - Dramabite
      summary: Get episode details
      description: Mengambil detail episode termasuk link streaming video
      parameters:
        - name: cid
          in: query
          description: Drama ID
          required: true
          schema:
            type: integer
            minimum: 1
        - name: vid
          in: query
          description: Episode number
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Episode detail retrieved successfully"
                  data:
                    $ref: "#/components/schemas/DramabiteEpisodeDetail"
                  cid:
                    type: integer
                  vid:
                    type: integer

  /dramabite/recommendations:
    get:
      tags:
        - Dramabite
      summary: Get play end recommendations
      description: Mengambil rekomendasi drama setelah video selesai
      parameters:
        - name: cid
          in: query
          description: Drama ID
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Play end recommendations retrieved successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DramabiteDrama"
                  cid:
                    type: integer
                  count:
                    type: integer

  /dramabite/drama-complete:
    get:
      tags:
        - Dramabite
      summary: Get complete drama information
      description: Mengambil informasi lengkap drama termasuk episode dan rekomendasi
      parameters:
        - name: cid
          in: query
          description: Drama ID
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Complete drama information retrieved successfully"
                  data:
                    type: object
                    properties:
                      episodes:
                        type: array
                        items:
                          $ref: "#/components/schemas/DramabiteEpisode"
                      recommendations:
                        type: array
                        items:
                          $ref: "#/components/schemas/DramabiteDrama"
                  cid:
                    type: integer
                  episodeCount:
                    type: integer
                  recommendationCount:
                    type: integer

components:
  schemas:
    Drama:
      type: object
      properties:
        bookId:
          type: string
          description: Unique identifier for drama
          example: "42000005973"
        bookName:
          type: string
          description: Title of the drama
          example: "Menantu Ibu Mertua"
        coverWap:
          type: string
          format: uri
          description: URL to cover image
          example: "https://hwztchapter.dramaboxdb.com/data/cppartner/4x2/42x0/420x0/42000005973/42000005973.jpg"
        chapterCount:
          type: integer
          description: Number of chapters/episodes
          example: 96
        introduction:
          type: string
          description: Brief description of the drama
          example: "Cerita tentang menantu dan ibu mertua yang penuh konflik..."
        tags:
          type: array
          items:
            type: string
          description: List of genre tags
          example: ["Drama", "Keluarga", "Romantis"]
        protagonist:
          type: string
          description: Main characters
          example: "Sarah, Bunda Siti"
        dataFrom:
          type: string
          description: Data source
          example: "大数据"
        cardType:
          type: integer
          description: Card type identifier
          example: 1
        rankVo:
          $ref: "#/components/schemas/RankInfo"
        markNamesConnectKey:
          type: string
          description: Connector for tag names
          example: ", "
        bookShelfTime:
          type: integer
          format: int64
          description: Book shelf timestamp
          example: 1772528400000
        shelfTime:
          type: string
          description: Formatted shelf time
          example: "2026-03-03 17:00:00"
        inLibrary:
          type: boolean
          description: Whether drama is in user's library
          example: false

    DramaDetail:
      allOf:
        - $ref: "#/components/schemas/Drama"
        - type: object
          properties:
            tagV3s:
              type: array
              items:
                $ref: "#/components/schemas/TagV3"
            isEntry:
              type: integer
              description: Entry status
              example: 0
            index:
              type: integer
              description: Index position
              example: 0

    Episode:
      type: object
      properties:
        chapterId:
          type: string
          description: Episode ID
          example: "42000005973_1"
        chapterName:
          type: string
          description: Episode title
          example: "Episode 1: Pertemuan Pertama"
        chapterIndex:
          type: integer
          description: Episode number
          example: 1
        isFree:
          type: boolean
          description: Whether episode is free
          example: true
        coverWap:
          type: string
          format: uri
          description: Episode cover image
          example: "https://hwztchapter.dramaboxdb.com/episode/cover.jpg"

    TagV3:
      type: object
      properties:
        tagId:
          type: integer
          description: Tag ID
          example: 1399
        tagName:
          type: string
          description: Tag name in Indonesian
          example: "Serangan Balik"
        tagEnName:
          type: string
          description: Tag name in English
          example: "Counterattack"

    RankInfo:
      type: object
      properties:
        rankType:
          type: integer
          description: Type of ranking
          example: 3
        hotCode:
          type: string
          description: Hotness code
          example: "3.3K"
        sort:
          type: integer
          description: Sort order
          example: 7

    PopularSearch:
      type: object
      properties:
        keyword:
          type: string
          description: Search keyword
          example: "cinta"
        searchCount:
          type: integer
          description: Number of searches
          example: 1500
        rank:
          type: integer
          description: Popularity rank
          example: 1

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Parameter query dibutuhkan"
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2026-03-03T20:00:00.000Z"

    # ReelShort Schemas
    ReelShortSearchResult:
      type: object
      properties:
        book_id:
          type: string
          description: Unique identifier for drama
          example: "691e7400967bec54170e4a87"
        book_title:
